services:
  - type: web
    name: saathiya-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true   # Render automatically ek secure random value set karega
      - key: GOOGLE_CLIENT_ID
        sync: false           # Google Cloud Console se milega (optional)
      - key: DATABASE_URL
        sync: false           # Optional: PostgreSQL URL; nahi diya to SQLite use hogi
