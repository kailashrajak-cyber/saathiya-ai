<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Saathiya AI</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#16213E">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Saathiya">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Hind:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16213E;
    --bg-soft:#202C4F;
    --paper:#FBF1E0;
    --ink:#2B2420;
    --marigold:#F2A93B;
    --marigold-light:#F7C572;
    --teal:#3FA796;
    --rose:#E2685A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Hind',sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:
      radial-gradient(1px 1px at 12% 10%, rgba(255,255,255,0.14), transparent),
      radial-gradient(1px 1px at 78% 18%, rgba(255,255,255,0.10), transparent),
      radial-gradient(1px 1px at 55% 32%, rgba(255,255,255,0.09), transparent),
      radial-gradient(1px 1px at 28% 52%, rgba(255,255,255,0.11), transparent),
      radial-gradient(1px 1px at 88% 60%, rgba(255,255,255,0.08), transparent),
      radial-gradient(1px 1px at 42% 78%, rgba(255,255,255,0.10), transparent),
      radial-gradient(1px 1px at 8% 88%, rgba(255,255,255,0.08), transparent),
      var(--bg);
  }
  header{
    position:relative;
    overflow:hidden;
    padding:22px 18px 18px;
    background:
      radial-gradient(140px 100px at 34px 30px, rgba(242,169,59,0.30), transparent 70%),
      linear-gradient(160deg,var(--bg-soft),var(--bg));
    border-bottom:1px solid rgba(242,169,59,0.22);
  }
  header::after{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      radial-gradient(1.5px 1.5px at 22% 25%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 65% 12%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 85% 45%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 48% 70%, rgba(255,255,255,0.22), transparent),
      radial-gradient(1.5px 1.5px at 92% 75%, rgba(255,255,255,0.28), transparent);
    pointer-events:none;
  }
  .header-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    position:relative;
    z-index:1;
  }
  .header-brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  #newChatBtn{
    flex:0 0 auto;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.18);
    color:#D9DEEC;
    padding:7px 12px;
    border-radius:999px;
    font-size:0.72rem;
    font-family:'Hind',sans-serif;
    font-weight:600;
    cursor:pointer;
    transition:transform 0.12s ease, background 0.15s ease;
    white-space:nowrap;
  }
  #newChatBtn:hover, #newChatBtn:focus{
    background:rgba(255,255,255,0.14);
    outline:none;
  }
  #newChatBtn:active{ transform:scale(0.95); }
  .diya-icon{ flex:0 0 auto; }
  .diya-icon .flame, .diya-icon .flame-inner{
    transform-box:fill-box;
    transform-origin:50% 60%;
    animation:flicker 2.6s ease-in-out infinite;
  }
  .diya-icon .flame-inner{ animation-delay:0.3s; }
  @keyframes flicker{
    0%,100%{ transform:scale(1,1); opacity:1; }
    25%{ transform:scale(0.96,1.06); opacity:0.9; }
    50%{ transform:scale(1.04,0.95); opacity:1; }
    75%{ transform:scale(0.98,1.03); opacity:0.94; }
  }
  @media (prefers-reduced-motion:reduce){
    .diya-icon .flame, .diya-icon .flame-inner{ animation:none; }
  }
  header h1{
    font-family:'Kalam',cursive;
    font-weight:700;
    color:var(--marigold);
    font-size:1.65rem;
    margin:0;
  }
  header p{
    color:#AFB9D4;
    font-size:0.85rem;
    margin:9px 0 0;
    line-height:1.5;
    position:relative;
    z-index:1;
    max-width:88%;
  }
  #installBtn{
    display:none;
    margin-top:12px;
    background:transparent;
    border:1px solid var(--marigold);
    color:var(--marigold);
    padding:7px 16px;
    border-radius:999px;
    font-size:0.78rem;
    font-family:'Hind',sans-serif;
    font-weight:600;
    cursor:pointer;
    position:relative;
    z-index:1;
    transition:transform 0.12s ease, background 0.15s ease;
  }
  #installBtn:hover, #installBtn:focus{
    background:rgba(242,169,59,0.15);
    outline:none;
  }
  #installBtn:active{ transform:scale(0.96); }
  .chat{
    flex:1;
    overflow-y:auto;
    padding:18px 14px;
    display:flex;
    flex-direction:column;
    gap:14px;
    justify-content:center;
    transition:justify-content 0.2s ease;
  }
  .chat.active{
    justify-content:flex-start;
  }
  .msg{
    max-width:82%;
    padding:11px 15px;
    border-radius:16px;
    font-size:0.95rem;
    line-height:1.55;
    white-space:pre-wrap;
    animation:riseIn 0.32s ease-out;
  }
  @keyframes riseIn{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @media (prefers-reduced-motion:reduce){
    .msg{ animation:none; }
  }
  .msg.ai{
    align-self:flex-start;
    background:var(--paper);
    color:var(--ink);
    border-bottom-left-radius:4px;
    box-shadow:0 3px 10px rgba(0,0,0,0.28);
  }
  .msg-content p{ margin:0 0 8px; }
  .msg-content p:last-child{ margin-bottom:0; }
  .msg-content ul, .msg-content ol{ margin:6px 0; padding-left:20px; }
  .msg-content li{ margin-bottom:4px; }
  .msg-content strong{ color:#7A4E14; }
  .msg-meta{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:7px;
    padding-top:7px;
    border-top:1px solid rgba(43,36,32,0.1);
  }
  .msg-time{
    font-size:0.68rem;
    color:#9A8E7C;
  }
  .copy-btn{
    background:none;
    border:none;
    padding:0;
    font-size:0.7rem;
    color:#8A6A2E;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:3px;
    font-family:'Hind',sans-serif;
    font-weight:600;
  }
  .copy-btn:active{ opacity:0.6; }
  .msg.user{
    align-self:flex-end;
    background:linear-gradient(135deg,var(--marigold-light),var(--marigold));
    color:#2B2000;
    border-bottom-right-radius:4px;
    box-shadow:0 3px 10px rgba(242,169,59,0.25);
  }
  .msg.user .msg-time{
    color:rgba(43,32,0,0.55);
    margin-top:5px;
    display:block;
  }
  .msg.crisis{
    align-self:flex-start;
    background:#FFE3DC;
    border:1px solid var(--rose);
    color:var(--ink);
    border-bottom-left-radius:4px;
  }
  #micBtn{
    flex:0 0 auto;
    background:#fff;
    border:none;
    border-radius:50%;
    width:42px;
    height:42px;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:1.1rem;
    cursor:pointer;
    transition:transform 0.12s ease, background 0.15s ease;
  }
  #micBtn.listening{
    background:var(--rose);
    animation:micPulse 1s infinite ease-in-out;
  }
  @keyframes micPulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(226,104,90,0.5); }
    50%{ box-shadow:0 0 0 8px rgba(226,104,90,0); }
  }
  #micBtn:active{ transform:scale(0.92); }
  .typing{
    align-self:flex-start;
    display:flex;
    align-items:center;
    gap:8px;
    color:#C9CEDC;
    font-size:0.85rem;
    padding-left:4px;
  }
  .typing .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--marigold);
    animation:pulse 1.2s infinite ease-in-out;
  }
  @keyframes pulse{
    0%,100%{transform:scale(0.7);opacity:0.5;}
    50%{transform:scale(1);opacity:1;}
  }
  @media (prefers-reduced-motion:reduce){
    .typing .dot{animation:none;}
  }
  .chips-wrap{ padding-top:2px; }
  .chips-label{
    margin:0 0 7px 18px;
    font-size:0.72rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:#8FC4B8;
    font-weight:700;
  }
  .chips{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:0 14px 12px;
    scrollbar-width:none;
    -webkit-mask-image:linear-gradient(to right, black 88%, transparent 100%);
    mask-image:linear-gradient(to right, black 88%, transparent 100%);
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    background:rgba(63,167,150,0.18);
    border:1px solid var(--teal);
    color:#BFE9DF;
    padding:7px 15px;
    border-radius:999px;
    font-size:0.8rem;
    font-family:'Hind',sans-serif;
    cursor:pointer;
    white-space:nowrap;
    transition:transform 0.12s ease, background 0.15s ease;
  }
  .chip:hover, .chip:focus{
    background:rgba(63,167,150,0.35);
    outline:none;
  }
  .chip:active{ transform:scale(0.95); }
  form{
    display:flex;
    gap:8px;
    padding:10px 14px;
    background:var(--bg-soft);
  }
  input[type=text]{
    flex:1;
    border:none;
    border-radius:20px;
    padding:11px 16px;
    font-size:0.95rem;
    font-family:'Hind',sans-serif;
    background:#fff;
    color:var(--ink);
  }
  input[type=text]:focus{
    outline:2px solid var(--marigold);
  }
  button[type=submit]{
    background:linear-gradient(135deg,var(--marigold-light),var(--marigold));
    color:#2B1500;
    border:none;
    border-radius:22px;
    padding:0 20px;
    font-weight:700;
    font-size:0.9rem;
    font-family:'Hind',sans-serif;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(242,169,59,0.32);
    transition:transform 0.12s ease;
  }
  button[type=submit]:active{ transform:scale(0.96); }
  button[type=submit]:disabled{
    opacity:0.5;
    cursor:not-allowed;
    box-shadow:none;
  }
  button[type=submit]:focus{
    outline:2px solid #fff;
  }
  footer{
    text-align:center;
    font-size:0.72rem;
    color:#8E96AC;
    padding:14px 22px 20px;
    background:var(--bg-soft);
    border-top:1px solid rgba(255,255,255,0.06);
    line-height:1.6;
  }
  footer a{
    color:#BFE9DF;
    text-decoration:none;
    border-bottom:1px solid rgba(191,233,223,0.4);
  }
  footer .credit{
    display:block;
    margin-top:7px;
    opacity:0.8;
    font-size:0.7rem;
  }
  footer .credit a{
    color:var(--marigold);
    border-bottom-color:rgba(242,169,59,0.4);
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-top">
      <div class="header-brand">
        <svg class="diya-icon" width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <ellipse cx="17" cy="24.5" rx="13" ry="4" fill="#F2A93B"/>
          <ellipse cx="17" cy="23" rx="9" ry="2.5" fill="#16213E"/>
          <path class="flame" d="M17 6c2.3 3.1 3.5 5.7 3.5 8.1a3.5 3.5 0 1 1-7 0c0-2.4 1.2-5 3.5-8.1z" fill="#F2A93B"/>
          <path class="flame-inner" d="M17 11.2c1 1.6 1.6 2.9 1.6 4a1.6 1.6 0 1 1-3.2 0c0-1.1 0.6-2.4 1.6-4z" fill="#FFD98A"/>
        </svg>
        <h1>Saathiya AI</h1>
      </div>
      <button id="newChatBtn" type="button">🔄 Nayi Baat</button>
    </div>
    <p>Tumhari judgment-free dost — health aur body ke sawaalon ke liye</p>
    <button id="installBtn" type="button">📲 App Install Karo</button>
  </header>
  <div class="chat" id="chat"></div>
  <div class="chips-wrap">
    <p class="chips-label">Jaldi shuru karein</p>
    <div class="chips" id="chips"></div>
  </div>
  <form id="chatForm">
    <input type="text" id="userInput" placeholder="Apna sawaal yahan likho..." autocomplete="off">
    <button type="button" id="micBtn" aria-label="Voice input">🎤</button>
    <button type="submit" id="sendBtn">Bhejo</button>
  </form>
  <footer>
    ⚠️ Saathiya AI doctor nahi hai. Serious problem ho to trusted adult se baat karo.<br>
    <a href="/privacy">Privacy Policy</a>
    <span class="credit">Made by Kailash Rajak — <a href="https://github.com/kailashrajak-cyber" target="_blank" rel="noopener">GitHub</a> · <a href="https://www.linkedin.com/in/kailash-rajak-39b571386" target="_blank" rel="noopener">LinkedIn</a></span>
  </footer>
</div>

<script>
const CRISIS_KEYWORDS = [
  "suicide","khud ko khatam","marna chahta","marna chahti","jeena nahi chahta",
  "jeene ka mann nahi","khud ko nuksaan","self harm","cutting","khatam kar du",
  "zindagi khatam","mar jaana chahta","mar jaana chahti","khud ko maar"
];

const CRISIS_MESSAGE = "Lagta hai tum kisi bahut mushkil pal se guzar rahe ho. Tum akele nahi ho, aur jo feel kar rahe ho usko share karna bahut bahadur kadam hai.\n\nPlease abhi kisi se baat karo:\n📞 iCall — 9152987821 (Mon–Sat, 10am–8pm)\n📞 KIRAN Helpline — 1800-599-0019 (24x7, free)\n\nIske saath kisi trusted adult — parent, teacher, ya counselor se bhi baat karna, jitna jaldi ho sake.";

const WELCOME_MESSAGE = "Hii, main Saathiya hoon — tumhari judgment-free dost. Health, body, ya emotions se related jo bhi sawaal ho, khulke pooch sakte ho. Main na tumhara naam poochungi, na kuch save karungi — bas help karungi. 🪔";

const SUGGESTIONS = [
  {label:"Acne", msg:"Mujhe acne/pimples ho rahe hain, kya karu?"},
  {label:"Period cramps", msg:"Period cramps me kya karu?"},
  {label:"Stress", msg:"Stress kam karne ke liye kya karu?"},
  {label:"Sleep", msg:"Achi sleep kaise le?"},
  {label:"Body changes", msg:"Puberty me body changes normal hain kya?"},
  {label:"Diet", msg:"Healthy diet kaise follow karu?"}
];

let chatHistory = [];

function escapeHtml(str){
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function renderMarkdown(text){
  let safe = escapeHtml(text);
  safe = safe.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  const lines = safe.split("\n");
  let html = "";
  let listType = null;
  for(const line of lines){
    const bullet = line.match(/^\s*[-•]\s+(.*)/);
    const numbered = line.match(/^\s*\d+[\.\)]\s+(.*)/);
    if(bullet){
      if(listType !== "ul"){ if(listType) html += listType==="ul"?"</ul>":"</ol>"; html += "<ul>"; listType="ul"; }
      html += `<li>${bullet[1]}</li>`;
    } else if(numbered){
      if(listType !== "ol"){ if(listType) html += listType==="ul"?"</ul>":"</ol>"; html += "<ol>"; listType="ol"; }
      html += `<li>${numbered[1]}</li>`;
    } else {
      if(listType){ html += listType==="ul"?"</ul>":"</ol>"; listType=null; }
      if(line.trim() !== ""){ html += `<p>${line}</p>`; }
    }
  }
  if(listType){ html += listType==="ul"?"</ul>":"</ol>"; }
  return html;
}

function formatTime(){
  return new Date().toLocaleTimeString('hi-IN', { hour:'2-digit', minute:'2-digit' });
}

function addMessage(role, text){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  if(role === 'user'){
    const body = document.createElement('div');
    body.textContent = text;
    div.appendChild(body);
    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = formatTime();
    div.appendChild(time);
  } else {
    const content = document.createElement('div');
    content.className = 'msg-content';
    content.innerHTML = renderMarkdown(text);
    div.appendChild(content);

    const meta = document.createElement('div');
    meta.className = 'msg-meta';

    const copyBtn = document.createElement('button');
    copyBtn.type = 'button';
    copyBtn.className = 'copy-btn';
    copyBtn.innerHTML = '📋 Copy';
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.innerHTML = '✓ Copied';
        setTimeout(() => { copyBtn.innerHTML = '📋 Copy'; }, 1500);
      }).catch(() => {});
    });
    meta.appendChild(copyBtn);

    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = formatTime();
    meta.appendChild(time);

    div.appendChild(meta);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping(){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span class="dot"></span><span class="dot" style="animation-delay:0.2s"></span><span class="dot" style="animation-delay:0.4s"></span> Saathiya soch rahi hai...';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping(){
  const t = document.getElementById('typingIndicator');
  if(t) t.remove();
}

function checkCrisis(text){
  const lower = text.toLowerCase();
  return CRISIS_KEYWORDS.some(k => lower.includes(k));
}

function renderChips(){
  const wrap = document.getElementById('chips');
  SUGGESTIONS.forEach(s => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'chip';
    btn.textContent = s.label;
    btn.addEventListener('click', () => {
      document.getElementById('userInput').value = s.msg;
      document.getElementById('chatForm').requestSubmit();
    });
    wrap.appendChild(btn);
  });
}

async function callSaathiya(userText){
  showTyping();
  try{
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: userText, history: chatHistory })
    });
    const data = await response.json();
    hideTyping();
    if(!response.ok){
      throw new Error(data.error || "API error");
    }
    chatHistory.push({role:"user", content:userText});
    chatHistory.push({role:"assistant", content:data.reply});
    if(chatHistory.length > 20){
      chatHistory = chatHistory.slice(chatHistory.length - 20);
    }
    addMessage(data.crisis ? "crisis" : "ai", data.reply);
  }catch(err){
    hideTyping();
    addMessage("ai", "Kuch technical problem ho gaya 😕 thodi der me phir try karo, ya kisi trusted adult se baat karo agar urgent hai.");
  }
}

document.getElementById('chatForm').addEventListener('submit', function(e){
  e.preventDefault();
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text) return;
  document.getElementById('chat').classList.add('active');
  addMessage("user", text);
  input.value = "";

  if(checkCrisis(text)){
    addMessage("crisis", CRISIS_MESSAGE);
    chatHistory.push({role:"user", content:text});
    chatHistory.push({role:"assistant", content:CRISIS_MESSAGE});
    if(chatHistory.length > 20){
      chatHistory = chatHistory.slice(chatHistory.length - 20);
    }
    return;
  }

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  callSaathiya(text).finally(() => { sendBtn.disabled = false; });
});

renderChips();
addMessage("ai", WELCOME_MESSAGE);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}

let deferredInstallPrompt = null;
const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  installBtn.style.display = "inline-block";
});

installBtn.addEventListener("click", async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  installBtn.style.display = "none";
});

window.addEventListener("appinstalled", () => {
  installBtn.style.display = "none";
});

document.getElementById('newChatBtn').addEventListener('click', () => {
  chatHistory = [];
  document.getElementById('chat').innerHTML = '';
  document.getElementById('chat').classList.remove('active');
  addMessage('ai', WELCOME_MESSAGE);
});

const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
const micBtn = document.getElementById('micBtn');
if(SpeechRecognitionAPI){
  micBtn.style.display = 'flex';
  const recognition = new SpeechRecognitionAPI();
  recognition.lang = 'hi-IN';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  micBtn.addEventListener('click', () => {
    micBtn.classList.add('listening');
    try{ recognition.start(); }catch(e){ micBtn.classList.remove('listening'); }
  });

  recognition.addEventListener('result', (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('userInput').value = transcript;
  });

  recognition.addEventListener('end', () => {
    micBtn.classList.remove('listening');
  });

  recognition.addEventListener('error', () => {
    micBtn.classList.remove('listening');
  });
}
</script>
</body>
</html>
