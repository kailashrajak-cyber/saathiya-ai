<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Saathiya AI</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#16213E">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Saathiya">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Hind:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16213E;
    --bg-soft:#202C4F;
    --paper:#FBF1E0;
    --ink:#2B2420;
    --marigold:#F2A93B;
    --teal:#3FA796;
    --rose:#E2685A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Hind',sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
  }
  header{
    padding:20px 18px 16px;
    background:linear-gradient(160deg,var(--bg-soft),var(--bg));
    border-bottom:1px solid rgba(242,169,59,0.25);
  }
  header h1{
    font-family:'Kalam',cursive;
    color:var(--marigold);
    font-size:1.6rem;
    margin:0 0 2px;
  }
  header p{
    color:#C9CEDC;
    font-size:0.85rem;
    margin:0;
  }
  #installBtn{
    display:none;
    margin-top:10px;
    background:transparent;
    border:1px solid var(--marigold);
    color:var(--marigold);
    padding:6px 14px;
    border-radius:999px;
    font-size:0.78rem;
    font-family:'Hind',sans-serif;
    cursor:pointer;
  }
  #installBtn:hover, #installBtn:focus{
    background:rgba(242,169,59,0.15);
    outline:none;
  }
  .chat{
    flex:1;
    overflow-y:auto;
    padding:18px 14px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .msg{
    max-width:82%;
    padding:10px 14px;
    border-radius:14px;
    font-size:0.95rem;
    line-height:1.5;
    white-space:pre-wrap;
  }
  .msg.ai{
    align-self:flex-start;
    background:var(--paper);
    color:var(--ink);
    border-bottom-left-radius:4px;
    box-shadow:0 2px 6px rgba(0,0,0,0.25);
    position:relative;
    padding-left:38px;
  }
  .msg.ai::before{
    content:"🪔";
    position:absolute;
    left:10px;
    top:10px;
    font-size:1rem;
  }
  .msg.user{
    align-self:flex-end;
    background:var(--marigold);
    color:#2B2000;
    border-bottom-right-radius:4px;
  }
  .msg.crisis{
    align-self:flex-start;
    background:#FFE3DC;
    border:1px solid var(--rose);
    color:var(--ink);
    border-bottom-left-radius:4px;
  }
  .typing{
    align-self:flex-start;
    display:flex;
    align-items:center;
    gap:8px;
    color:#C9CEDC;
    font-size:0.85rem;
    padding-left:4px;
  }
  .typing .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--marigold);
    animation:pulse 1.2s infinite ease-in-out;
  }
  @keyframes pulse{
    0%,100%{transform:scale(0.7);opacity:0.5;}
    50%{transform:scale(1);opacity:1;}
  }
  @media (prefers-reduced-motion:reduce){
    .typing .dot{animation:none;}
  }
  .chips{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:0 14px 10px;
    scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    background:rgba(63,167,150,0.18);
    border:1px solid var(--teal);
    color:#BFE9DF;
    padding:6px 14px;
    border-radius:999px;
    font-size:0.8rem;
    font-family:'Hind',sans-serif;
    cursor:pointer;
    white-space:nowrap;
  }
  .chip:hover, .chip:focus{
    background:rgba(63,167,150,0.35);
    outline:none;
  }
  form{
    display:flex;
    gap:8px;
    padding:10px 14px;
    background:var(--bg-soft);
  }
  input[type=text]{
    flex:1;
    border:none;
    border-radius:20px;
    padding:11px 16px;
    font-size:0.95rem;
    font-family:'Hind',sans-serif;
    background:#fff;
    color:var(--ink);
  }
  input[type=text]:focus{
    outline:2px solid var(--marigold);
  }
  button[type=submit]{
    background:var(--marigold);
    color:#2B2000;
    border:none;
    border-radius:20px;
    padding:0 18px;
    font-weight:600;
    font-size:0.9rem;
    font-family:'Hind',sans-serif;
    cursor:pointer;
  }
  button[type=submit]:disabled{
    opacity:0.5;
    cursor:not-allowed;
  }
  button[type=submit]:focus{
    outline:2px solid #fff;
  }
  footer{
    text-align:center;
    font-size:0.7rem;
    color:#B0B8CE;
    padding:8px 16px 16px;
    background:var(--bg-soft);
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🪔 Saathiya AI</h1>
    <p>Tumhari judgment-free dost — health aur body ke sawaalon ke liye</p>
    <button id="installBtn" type="button">📲 App Install Karo</button>
  </header>
  <div class="chat" id="chat"></div>
  <div class="chips" id="chips"></div>
  <form id="chatForm">
    <input type="text" id="userInput" placeholder="Apna sawaal yahan likho..." autocomplete="off">
    <button type="submit" id="sendBtn">Bhejo</button>
  </form>
  <footer><footer>⚠️ Saathiya AI doctor nahi hai. Serious problem ho to trusted adult se baat karo.<br><a href="/privacy" style="color:#BFE9DF;">Privacy Policy</a><br><span style="opacity:0.8;">Made by Kailash Rajak — <a href="https://github.com/kailashrajak-cyber" target="_blank" rel="noopener" style="color:#F2A93B;">GitHub</a> · <a href="https://www.linkedin.com/in/kailash-rajak-39b571386" target="_blank" rel="noopener" style="color:#F2A93B;">LinkedIn</a></span></footer>

<script>
const CRISIS_KEYWORDS = [
  "suicide","khud ko khatam","marna chahta","marna chahti","jeena nahi chahta",
  "jeene ka mann nahi","khud ko nuksaan","self harm","cutting","khatam kar du",
  "zindagi khatam","mar jaana chahta","mar jaana chahti","khud ko maar"
];

const CRISIS_MESSAGE = "Lagta hai tum kisi bahut mushkil pal se guzar rahe ho. Tum akele nahi ho, aur jo feel kar rahe ho usko share karna bahut bahadur kadam hai.\n\nPlease abhi kisi se baat karo:\n📞 iCall — 9152987821 (Mon–Sat, 10am–8pm)\n📞 KIRAN Helpline — 1800-599-0019 (24x7, free)\n\nIske saath kisi trusted adult — parent, teacher, ya counselor se bhi baat karna, jitna jaldi ho sake.";

const WELCOME_MESSAGE = "Hii, main Saathiya hoon — tumhari judgment-free dost. Health, body, ya emotions se related jo bhi sawaal ho, khulke pooch sakte ho. Main na tumhara naam poochungi, na kuch save karungi — bas help karungi. 🪔";

const SUGGESTIONS = [
  {label:"Acne", msg:"Mujhe acne/pimples ho rahe hain, kya karu?"},
  {label:"Period cramps", msg:"Period cramps me kya karu?"},
  {label:"Stress", msg:"Stress kam karne ke liye kya karu?"},
  {label:"Sleep", msg:"Achi sleep kaise le?"},
  {label:"Body changes", msg:"Puberty me body changes normal hain kya?"},
  {label:"Diet", msg:"Healthy diet kaise follow karu?"}
];

let chatHistory = [];

function addMessage(role, text){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping(){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span class="dot"></span><span class="dot" style="animation-delay:0.2s"></span><span class="dot" style="animation-delay:0.4s"></span> Saathiya soch rahi hai...';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping(){
  const t = document.getElementById('typingIndicator');
  if(t) t.remove();
}

function checkCrisis(text){
  const lower = text.toLowerCase();
  return CRISIS_KEYWORDS.some(k => lower.includes(k));
}

function renderChips(){
  const wrap = document.getElementById('chips');
  SUGGESTIONS.forEach(s => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'chip';
    btn.textContent = s.label;
    btn.addEventListener('click', () => {
      document.getElementById('userInput').value = s.msg;
      document.getElementById('chatForm').requestSubmit();
    });
    wrap.appendChild(btn);
  });
}

async function callSaathiya(userText){
  showTyping();
  try{
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: userText, history: chatHistory })
    });
    const data = await response.json();
    hideTyping();
    if(!response.ok){
      throw new Error(data.error || "API error");
    }
    chatHistory.push({role:"user", content:userText});
    chatHistory.push({role:"assistant", content:data.reply});
    if(chatHistory.length > 20){
      chatHistory = chatHistory.slice(chatHistory.length - 20);
    }
    addMessage(data.crisis ? "crisis" : "ai", data.reply);
  }catch(err){
    hideTyping();
    addMessage("ai", "Kuch technical problem ho gaya 😕 thodi der me phir try karo, ya kisi trusted adult se baat karo agar urgent hai.");
  }
}

document.getElementById('chatForm').addEventListener('submit', function(e){
  e.preventDefault();
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text) return;
  addMessage("user", text);
  input.value = "";

  if(checkCrisis(text)){
    addMessage("crisis", CRISIS_MESSAGE);
    chatHistory.push({role:"user", content:text});
    chatHistory.push({role:"assistant", content:CRISIS_MESSAGE});
    if(chatHistory.length > 20){
      chatHistory = chatHistory.slice(chatHistory.length - 20);
    }
    return;
  }

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  callSaathiya(text).finally(() => { sendBtn.disabled = false; });
});

renderChips();
addMessage("ai", WELCOME_MESSAGE);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}

let deferredInstallPrompt = null;
const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  installBtn.style.display = "inline-block";
});

installBtn.addEventListener("click", async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  installBtn.style.display = "none";
});

window.addEventListener("appinstalled", () => {
  installBtn.style.display = "none";
});
</script>
</body>
</html>
